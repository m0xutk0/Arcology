name: Build iOS Game 🍏

on:
  workflow_dispatch: # Позволяет запускать сборку вручную одной кнопкой

jobs:
  build:
    name: Build and Pack IPA
    runs-on: macos-14 # Бесплатный M1 Mac-раннер от GitHub
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # Включает Git LFS, если у тебя тяжелые ассеты

      # Кэширование папки Library сэкономит кучу времени при повторных сборках
      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # GameCI собирает проект Unity и генерирует Xcode-проект
      - name: Build Xcode Project via GameCI
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: iOS

      # Облачный Мак компилирует проект в сырой .app и упаковывает в .ipa для Sideloadly
      - name: Compile Xcode to Unsigned IPA
        run: |
          # Заходим в папку с Xcode проектом
          cd build/iOS/iOS
          
          # Собираем бинарник игры
          xcodebuild -project Unity-iPhone.xcodeproj -scheme Unity-iPhone -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO OBJROOT=$PWD/build SYMROOT=$PWD/build
          
          # Создаем папку Payload для архивации
          mkdir -p Payload
          
          # Копируем твой настоящий собранный файл Arcologymini.app
          cp -r build/Release-iphoneos/Arcologymini.app Payload/
          
          # Упаковываем всё в .ipa и закидываем в корень репозитория
          zip -r ../../../MyGame.ipa Payload

      # Выкладываем готовый файл на страницу GitHub Actions для скачивания
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: MyGame.ipa